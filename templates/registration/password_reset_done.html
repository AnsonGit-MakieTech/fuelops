{% extends "base.html" %}
{% load static %}

{% block auth_content %}
  <section class="auth-card">
    <img class="auth-logo" src="{% static 'assets/fuelops-logo-with-text-rectangle.png' %}" alt="FuelOps Station Tracker">
    <div class="auth-status-icon"><i data-lucide="mail-check"></i></div>
    <h1>Check your email</h1>
    <p>If an account exists for that email, a password reset link has been sent.</p>
    <a class="btn-ghost auth-submit" href="{% url 'login' %}">Return to sign in</a>
  </section>
{% endblock %}
