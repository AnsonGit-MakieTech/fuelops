{% extends "base.html" %}
{% load static %}

{% block auth_content %}
  <section class="auth-card">
    <img class="auth-logo" src="{% static 'assets/fuelops-logo-with-text-rectangle.png' %}" alt="FuelOps Station Tracker">
    <h1>Reset password</h1>
    <p>Enter your account email. FuelOps will send a secure reset link.</p>
    <form method="post">
      {% csrf_token %}
      {% include "frontend/includes/form_fields.html" with form=form %}
      <button class="btn-accent auth-submit" type="submit"><i data-lucide="mail"></i> Send reset link</button>
    </form>
    <div class="auth-links"><a href="{% url 'login' %}">Return to sign in</a></div>
  </section>
{% endblock %}
