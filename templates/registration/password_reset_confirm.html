{% extends "base.html" %}
{% load static %}

{% block auth_content %}
  <section class="auth-card">
    <img class="auth-logo" src="{% static 'assets/fuelops-logo-with-text-rectangle.png' %}" alt="FuelOps Station Tracker">
    <h1>Choose a new password</h1>
    {% if validlink %}
      <form method="post">
        {% csrf_token %}
        {% include "frontend/includes/form_fields.html" with form=form %}
        <button class="btn-accent auth-submit" type="submit"><i data-lucide="key-round"></i> Update password</button>
      </form>
    {% else %}
      <p>This reset link is invalid or expired.</p>
      <a class="btn-accent auth-submit" href="{% url 'password_reset' %}">Request new link</a>
    {% endif %}
  </section>
{% endblock %}
