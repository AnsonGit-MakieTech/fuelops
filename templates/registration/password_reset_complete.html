{% extends "base.html" %}
{% load static %}

{% block auth_content %}
  <section class="auth-card">
    <img class="auth-logo" src="{% static 'assets/fuelops-logo-with-text-rectangle.png' %}" alt="FuelOps Station Tracker">
    <div class="auth-status-icon"><i data-lucide="shield-check"></i></div>
    <h1>Password updated</h1>
    <p>Your new password is active.</p>
    <a class="btn-accent auth-submit" href="{% url 'login' %}">Sign in</a>
  </section>
{% endblock %}
