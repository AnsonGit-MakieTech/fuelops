{% extends "base.html" %}

{% block content %}
  <div class="page-head">
    <div>
      <h2>Add Fuel Refill</h2>
      <p>Fuel deliveries update tank stock after saving.</p>
    </div>
  </div>

  <section class="panel">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        {% include "frontend/includes/form_fields.html" with form=form %}
      </div>
      <div class="button-row" style="margin-top: 18px;">
        <button class="btn-accent" type="submit"><i data-lucide="save"></i> Save Refill</button>
        <a class="btn-ghost" href="{% url 'fuel_deliveries' %}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
