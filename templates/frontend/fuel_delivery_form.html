{% extends "base.html" %}

{% block content %}
  <div class="page-head">
    <div>
      <h2>Add Fuel Refill</h2>
      <p>Fuel deliveries update tank stock after saving.</p>
    </div>
  </div>

  <section class="panel">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid" data-guide-target="fuel-refill-fields">
        {% include "frontend/includes/form_fields.html" with form=form %}
      </div>
      <div class="button-row" style="margin-top: 18px;" data-guide-target="fuel-refill-submit">
        <button
          class="btn-accent"
          type="submit"
          data-confirm-title="Save fuel refill?"
          data-confirm-message="This will save the supplier delivery and increase the selected tank inventory."
          data-confirm-label="Save Refill"
          data-confirm-variant="btn-accent"
        ><i data-lucide="save"></i> Save Refill</button>
        <a class="btn-ghost" href="{% url 'fuel_deliveries' %}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
