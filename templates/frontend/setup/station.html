{% extends "base.html" %}

{% block content %}
  <div class="page-head">
    <div>
      <h2>Configure {{ station.name }}</h2>
      <p>Add the first fuel product, tank, pump, and supplier to activate daily operations.</p>
    </div>
  </div>

  <section class="panel setup-panel">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid" data-guide-target="station-setup-fields">
        {% include "frontend/includes/form_fields.html" with form=form %}
      </div>
      <div class="button-row" style="margin-top: 18px;" data-guide-target="station-setup-submit">
        <button class="btn-accent" type="submit"><i data-lucide="check"></i> Complete Setup</button>
      </div>
    </form>
  </section>
{% endblock %}
