{% extends "base.html" %}

{% block content %}
  <div class="page-head">
    <div>
      <h2>{{ page_title }}</h2>
      <p>{{ station.name }} / {{ entity_label }}</p>
    </div>
  </div>

  <section class="panel setup-panel">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid">
        {% include "frontend/includes/form_fields.html" with form=form %}
      </div>
      <div class="button-row" style="margin-top: 18px;">
        <button
          class="btn-accent"
          type="submit"
          data-confirm-title="Save {{ entity_label|lower }}?"
          data-confirm-message="This updates the station configuration used by operational records."
          data-confirm-label="{{ submit_label }}"
          data-confirm-variant="btn-accent"
        ><i data-lucide="save"></i> {{ submit_label }}</button>
        <a class="btn-ghost" href="{{ cancel_url }}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
