{% extends "base.html" %}

{% block content %}
  <div class="page-head">
    <div>
      <h2>{% if editing %}Correct Expense{% else %}Add Expense{% endif %}</h2>
      <p>Expense records feed monthly profitability reports.</p>
    </div>
  </div>

  <section class="panel">
    <form method="post">
      {% csrf_token %}
      <div class="form-grid" data-guide-target="expense-fields">
        {% include "frontend/includes/form_fields.html" with form=form %}
      </div>
      <div class="button-row" style="margin-top: 18px;" data-guide-target="expense-submit">
        <button
          class="btn-accent"
          type="submit"
          data-confirm-title="{% if editing %}Save expense correction?{% else %}Save expense?{% endif %}"
          data-confirm-message="{% if editing %}This updates the expense used by official profit reports.{% else %}This will add the expense to station costs and monthly profit reports.{% endif %}"
          data-confirm-label="Save Expense"
          data-confirm-variant="btn-accent"
        ><i data-lucide="save"></i> {% if editing %}Save Correction{% else %}Save Expense{% endif %}</button>
        <a class="btn-ghost" href="{% url 'expenses' %}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
