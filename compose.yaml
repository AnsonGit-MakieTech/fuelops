name: fuelops

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fuelops}
      POSTGRES_USER: ${POSTGRES_USER:-fuelops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-fuelops}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-fuelops}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SECURE_HSTS_SECONDS: ${SECURE_HSTS_SECONDS:-0}
      SECURE_HSTS_INCLUDE_SUBDOMAINS: ${SECURE_HSTS_INCLUDE_SUBDOMAINS:-False}
      SECURE_HSTS_PRELOAD: ${SECURE_HSTS_PRELOAD:-False}
      TRUST_PROXY_SSL_HEADER: ${TRUST_PROXY_SSL_HEADER:-False}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-True}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-False}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-FuelOps <noreply@example.com>}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-True}
      COLLECT_STATIC: ${COLLECT_STATIC:-True}
      GUNICORN_CMD_ARGS: ${GUNICORN_CMD_ARGS:---workers=3 --threads=2 --timeout=60 --access-logfile=- --error-logfile=- --no-control-socket}
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    tmpfs:
      - /tmp
    read_only: true
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/accounts/login/', timeout=5)"]
      interval: 15s
      timeout: 6s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s

volumes:
  postgres_data:
  static_data:
  media_data:
